<svg viewBox="0 0 1000 840" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Segoe UI', system-ui, Arial, sans-serif; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5a6477"/>
    </marker>
    <marker id="arrowD" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8a94a6"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="840" fill="#ffffff"/>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2937">Arquitetura Azure — Alta Disponibilidade + Recuperação de Desastres</text>
  <text x="500" y="49" text-anchor="middle" font-size="12" fill="#6b7280">E-commerce 24/7 · múltiplas zonas de disponibilidade · autoscale 3→6 · banco PaaS</text>

  <!-- ===== Containers (drawn first, behind) ===== -->
  <rect x="250" y="190" width="440" height="600" rx="12" fill="#f4f6f8" stroke="#8a94a6" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="266" y="212" font-size="12.5" font-weight="700" fill="#475569">Região Primária — Brazil South (Zonas 1 · 2 · 3)</text>

  <rect x="720" y="190" width="240" height="600" rx="12" fill="#f7f7f9" stroke="#aab2c0" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="734" y="212" font-size="12" font-weight="700" fill="#64748b">Região Secundária — DR</text>
  <text x="734" y="228" font-size="10.5" fill="#94a3b8">(Brazil Southeast)</text>

  <rect x="270" y="298" width="400" height="362" rx="10" fill="#eef3fb" stroke="#aac4e8" stroke-width="1.4"/>
  <text x="284" y="317" font-size="11.5" font-weight="700" fill="#37598a">VNet — NSG por subnet (firewall)</text>

  <rect x="286" y="336" width="370" height="158" rx="8" fill="#ffffff" stroke="#c2d3ea" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="298" y="354" font-size="11" font-weight="600" fill="#5b7aa8">Subnet Web/App</text>

  <rect x="286" y="506" width="370" height="140" rx="8" fill="#ffffff" stroke="#c2d3ea" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="298" y="524" font-size="11" font-weight="600" fill="#5b7aa8">Subnet de Dados</text>

  <!-- ===== Edges: traffic (solid) ===== -->
  <path d="M470,106 L470,120" fill="none" stroke="#5a6477" stroke-width="1.8" marker-end="url(#arrow)"/>
  <path d="M470,168 V200 H495 V232" fill="none" stroke="#5a6477" stroke-width="1.8" marker-end="url(#arrow)"/>
  <path d="M495,278 V330 H470 V372" fill="none" stroke="#5a6477" stroke-width="1.8" marker-end="url(#arrow)"/>
  <path d="M620,404 H644 V573 H620" fill="none" stroke="#5a6477" stroke-width="1.8" marker-end="url(#arrow)"/>
  <path d="M470,602 V680" fill="none" stroke="#5a6477" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- ===== Edges: replication / failover (dashed) ===== -->
  <path d="M620,723 H730" fill="none" stroke="#8a94a6" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#arrowD)"/>
  <text x="675" y="716" text-anchor="middle" font-size="9.5" fill="#7c6aa0">Geo-replicação</text>
  <text x="675" y="736" text-anchor="middle" font-size="9.5" fill="#7c6aa0">(Failover Group)</text>

  <path d="M600,144 V180 H840 V300" fill="none" stroke="#8a94a6" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#arrowD)"/>
  <text x="720" y="174" text-anchor="middle" font-size="10" fill="#94a3b8">failover de região</text>

  <!-- ===== Edges: identity / secrets / telemetry (dashed) ===== -->
  <path d="M225,328 L320,390" fill="none" stroke="#8a94a6" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#arrowD)"/>
  <path d="M225,358 V702 H320" fill="none" stroke="#8a94a6" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#arrowD)"/>
  <path d="M225,400 L320,408" fill="none" stroke="#8a94a6" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#arrowD)"/>
  <path d="M225,485 L320,425" fill="none" stroke="#8a94a6" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#arrowD)"/>

  <!-- ===== Nodes ===== -->
  <!-- Users -->
  <rect x="365" y="66" width="210" height="40" rx="8" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
  <text x="470" y="91" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2937">Usuários (Internet)</text>

  <!-- Traffic Manager -->
  <rect x="340" y="120" width="260" height="48" rx="8" fill="#d6e6fb" stroke="#2f6fb0" stroke-width="1.6"/>
  <text x="470" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#173a5e">Azure Traffic Manager</text>
  <text x="470" y="156" text-anchor="middle" font-size="10.5" fill="#2c5d8f">failover entre regiões</text>

  <!-- App Gateway -->
  <rect x="360" y="232" width="270" height="46" rx="8" fill="#d6e6fb" stroke="#2f6fb0" stroke-width="1.6"/>
  <text x="495" y="251" text-anchor="middle" font-size="12" font-weight="700" fill="#173a5e">Application Gateway v2 + WAF</text>
  <text x="495" y="267" text-anchor="middle" font-size="10.5" fill="#2c5d8f">L7 · zona-redundante</text>

  <!-- VMSS -->
  <rect x="320" y="372" width="300" height="64" rx="8" fill="#dcefe0" stroke="#2f9e44" stroke-width="1.6"/>
  <text x="470" y="391" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">VM Scale Set — Linux (Ubuntu)</text>
  <text x="470" y="407" text-anchor="middle" font-size="10.5" fill="#1f6b34">Autoscale 3 → 6 instâncias (CPU)</text>
  <text x="470" y="422" text-anchor="middle" font-size="10.5" fill="#1f6b34">Managed Identity</text>

  <!-- Zone chips -->
  <rect x="320" y="448" width="92" height="34" rx="6" fill="#f0fbf2" stroke="#69b97a" stroke-width="1.3"/>
  <text x="366" y="469" text-anchor="middle" font-size="11" font-weight="700" fill="#1f6b34">Zona 1</text>
  <rect x="424" y="448" width="92" height="34" rx="6" fill="#f0fbf2" stroke="#69b97a" stroke-width="1.3"/>
  <text x="470" y="469" text-anchor="middle" font-size="11" font-weight="700" fill="#1f6b34">Zona 2</text>
  <rect x="528" y="448" width="92" height="34" rx="6" fill="#f0fbf2" stroke="#69b97a" stroke-width="1.3"/>
  <text x="574" y="469" text-anchor="middle" font-size="11" font-weight="700" fill="#1f6b34">Zona 3</text>

  <!-- Private Endpoint -->
  <rect x="320" y="544" width="300" height="58" rx="8" fill="#ffe9d1" stroke="#d98324" stroke-width="1.6"/>
  <text x="470" y="567" text-anchor="middle" font-size="12" font-weight="700" fill="#6b3b07">Private Endpoint (Private Link)</text>
  <text x="470" y="583" text-anchor="middle" font-size="10.5" fill="#8a5414">NSG · só origens autorizadas</text>

  <!-- Azure SQL primary -->
  <rect x="320" y="680" width="300" height="86" rx="8" fill="#ede3f7" stroke="#8e57c4" stroke-width="1.6"/>
  <text x="470" y="702" text-anchor="middle" font-size="12" font-weight="700" fill="#4a2370">Azure SQL Database (PaaS)</text>
  <text x="470" y="718" text-anchor="middle" font-size="10.5" fill="#5e3a8c">Zona-redundante · Backups automáticos (PITR)</text>
  <text x="470" y="733" text-anchor="middle" font-size="10.5" fill="#5e3a8c">Autenticação via Entra ID</text>

  <!-- Secondary VMSS -->
  <rect x="740" y="300" width="200" height="62" rx="8" fill="#dcefe0" stroke="#2f9e44" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="840" y="326" text-anchor="middle" font-size="11.5" font-weight="700" fill="#14532d">VMSS (standby)</text>
  <text x="840" y="343" text-anchor="middle" font-size="10" fill="#1f6b34">escala sob demanda</text>

  <!-- Secondary SQL -->
  <rect x="730" y="680" width="220" height="86" rx="8" fill="#ede3f7" stroke="#8e57c4" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="840" y="702" text-anchor="middle" font-size="11.5" font-weight="700" fill="#4a2370">Azure SQL — Réplica Geo</text>
  <text x="840" y="718" text-anchor="middle" font-size="10" fill="#5e3a8c">Failover Group</text>
  <text x="840" y="733" text-anchor="middle" font-size="10" fill="#5e3a8c">leitura → promovível</text>

  <!-- Entra ID -->
  <rect x="40" y="300" width="185" height="58" rx="8" fill="#fde0e0" stroke="#d05050" stroke-width="1.5"/>
  <text x="132" y="324" text-anchor="middle" font-size="11.5" font-weight="700" fill="#5e1c1c">Microsoft Entra ID</text>
  <text x="132" y="340" text-anchor="middle" font-size="10" fill="#7a2a2a">identidade + RBAC</text>

  <!-- Key Vault -->
  <rect x="40" y="378" width="185" height="58" rx="8" fill="#fde0e0" stroke="#d05050" stroke-width="1.5"/>
  <text x="132" y="402" text-anchor="middle" font-size="11.5" font-weight="700" fill="#5e1c1c">Azure Key Vault</text>
  <text x="132" y="418" text-anchor="middle" font-size="10" fill="#7a2a2a">segredos / conn. strings</text>

  <!-- Monitor -->
  <rect x="40" y="456" width="185" height="78" rx="8" fill="#fff4d1" stroke="#d6ab36" stroke-width="1.5"/>
  <text x="132" y="480" text-anchor="middle" font-size="11.5" font-weight="700" fill="#5c4708">Azure Monitor</text>
  <text x="132" y="496" text-anchor="middle" font-size="10" fill="#7a601a">Log Analytics + App Insights</text>
  <text x="132" y="511" text-anchor="middle" font-size="10" fill="#7a601a">métricas · logs · alertas</text>

  <!-- Legend -->
  <rect x="720" y="64" width="240" height="104" rx="8" fill="#fbfbfc" stroke="#d7dbe2" stroke-width="1"/>
  <text x="732" y="84" font-size="11" font-weight="700" fill="#475569">Legenda</text>
  <line x1="732" y1="102" x2="764" y2="102" stroke="#5a6477" stroke-width="2"/>
  <text x="772" y="106" font-size="10.5" fill="#475569">tráfego de usuários</text>
  <line x1="732" y1="124" x2="764" y2="124" stroke="#8a94a6" stroke-width="1.6" stroke-dasharray="5 3"/>
  <text x="772" y="128" font-size="10.5" fill="#475569">identidade · segredos</text>
  <line x1="732" y1="146" x2="764" y2="146" stroke="#8a94a6" stroke-width="1.6" stroke-dasharray="5 3"/>
  <text x="772" y="150" font-size="10.5" fill="#475569">replicação · telemetria</text>

  <!-- Bottom caption -->
  <text x="40" y="815" font-size="10" fill="#64748b">Tracejado: Microsoft Entra ID provê Managed Identity às VMs e autenticação ao SQL · Key Vault guarda segredos · Azure Monitor coleta telemetria de VMs, App Gateway e SQL.</text>
</svg>
